name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ubuntu:
    name: Ubuntu (GCC, core + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS (Clang, core + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows (MSVC, DX11 hook)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=ON
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=ON
          -DFRAMEWATCH_ENABLE_MINHOOK=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
