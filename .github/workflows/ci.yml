name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ubuntu:
    name: Ubuntu (GCC, core + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS (Clang, core + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize-asan:
    name: Ubuntu ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF
          -DFRAMEWATCH_BUILD_DEBUG_WINDOW=OFF
          -DFRAMEWATCH_SANITIZE_ADDRESS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: abort_on_error=1:print_stacktrace=1

  sanitize-tsan:
    name: Ubuntu TSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF
          -DFRAMEWATCH_BUILD_DEBUG_WINDOW=OFF
          -DFRAMEWATCH_SANITIZE_THREAD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          TSAN_OPTIONS: abort_on_error=1

  linux-preload:
    name: Ubuntu Linux LD_PRELOAD hook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=OFF
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=OFF
          -DFRAMEWATCH_BUILD_DEBUG_WINDOW=OFF
          -DFRAMEWATCH_BUILD_LINUX_PRELOAD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (preload smoke)
        run: ctest --test-dir build --output-on-failure -R "Linux preload"

  build-windows:
    name: Windows (MSVC, DX11 hook)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFRAMEWATCH_ENABLE_DX11_HOOK=ON
          -DFRAMEWATCH_BUILD_WINDOWS_BOOTSTRAP=ON
          -DFRAMEWATCH_ENABLE_MINHOOK=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
